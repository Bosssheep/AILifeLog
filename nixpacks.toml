providers = ["node"] # 强制只使用 Node 提供者，Python 环境由我们手动在 setup 里装

[phases.setup]
nixPkgs = ["python3", "nodejs", "gcc"]

[phases.install]
cmds = [
    "npm install",
    "python3 -m venv /opt/venv",
    "/opt/venv/bin/pip install --upgrade pip",
    "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "PATH=/opt/venv/bin:$PATH npm start"